name: Claude Review

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - 'package-lock.json'
      - '.output/**'
      - 'public/**'
      - '**/*.lock'
      - '**/*.md'
  pull_request:
    types: [opened, ready_for_review, synchronize]
    paths-ignore:
      - 'package-lock.json'
      - '.output/**'
      - 'public/**'
      - '**/*.lock'
      - '**/*.md'

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Measure diff size
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}" >/dev/null 2>&1 || true
            base="origin/${{ github.base_ref }}"
          else
            git fetch --no-tags origin main >/dev/null 2>&1 || true
            base="$(git merge-base origin/main HEAD 2>/dev/null || echo HEAD~1)"
          fi
          added_removed=$(git diff --shortstat "$base"...HEAD | grep -oE '[0-9]+ (insertion|deletion)' | awk '{s+=$1} END {print s+0}')
          echo "lines=$added_removed" >> "$GITHUB_OUTPUT"
          echo "Diff size: $added_removed lines (base: $base)"
          if [ "${added_removed:-0}" -gt 2000 ]; then
            echo "oversized=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip oversized diffs
        if: steps.diff.outputs.oversized == 'true'
        run: |
          echo "::notice::Diff exceeds 2000 changed lines — skipping Claude review to cap cost."

      - name: Claude review
        if: steps.diff.outputs.oversized != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are reviewing code changes for reIS, a Chrome extension that
            simplifies IS Mendelu. Read CLAUDE.md and AGENTS.md at the repo
            root first — they are the source of truth.

            On pull_request events, post inline review comments plus one
            summary comment on the PR. On push events (no PR yet), post a
            single commit comment on the head commit summarising findings.

            HARD RULES (violations must be flagged):
            - No localStorage / sessionStorage — use IndexedDBService.
            - No proxy / re-export barrels — import directly from the
              implementation file.
            - No useEffect for data fetching — belongs in services or store.
            - No custom CSS — DaisyUI semantic classes only.
            - No generic state — state lives in Zustand slices.
            - Max 200 lines per file.

            PARSER GUARDRAIL:
            Files in src/api/documents/parser.ts, src/api/ukoly.ts,
            src/api/osnovy.ts, and src/utils/parsers/** are extremely
            brittle. If the diff touches them, demand a real IS Mendelu HTML
            sample as evidence the change is correct. Flag any parser edit
            made to silence lint or fix a failing test — that is forbidden;
            the fixture should be fixed instead.

            REVIEW SCOPE:
            - Comment only on lines inside the diff.
            - Skip anything already caught by ESLint, Prettier, or tsc.
            - Prefer silence over speculation; tolerate a short review.
            - End with a summary containing only the non-empty sections
              among: Hard-rule violations, Parser risks, Bugs, Suggestions.
              Omit headers with nothing to report. If there is nothing
              substantive, reply "LGTM — no blocking issues found."
